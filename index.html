<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Forge 2 - Standardizing AI Prompt Engineering</title>
  <meta name="description" content="A local-first, multi-language prompt engineering engine for power users to standardize AI prompt composition.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>

<body>
  <div class="app">
    <header>
      <div class="logo">
        PROMPT FORGE2
        <span id="hdr-subtitle"></span>
      </div>
      <div class="header-right">
        <div class="lang-toggle">
          <button class="lang-btn" id="btn-ja" onclick="setLang('ja')">JA</button>
          <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
          <button class="lang-btn" id="btn-zh" onclick="setLang('zh')">ZH</button>
          <button class="lang-btn" id="btn-ko" onclick="setLang('ko')">KO</button>
          <button class="lang-btn" id="btn-es" onclick="setLang('es')">ES</button>
          <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
        </div>
        <div class="version-tag">v2.0 · MODULAR</div>
      </div>
    </header>

    <div class="score-bar">
      <div class="score-label">QUALITY SCORE</div>
      <div class="score-track">
        <div class="score-fill" id="scoreFill"></div>
      </div>
      <div class="score-num" id="scoreNum">0%</div>
      <div class="score-hint" id="scoreHint"></div>
    </div>

    <div class="main-grid">
      <div class="left-col">
        <!-- Form Sections -->
        <div class="form-section" id="sec-role">
          <div class="field-header">
            <span class="field-tag optional" id="tag-role"></span>
            <label for="f-role" id="lbl-role"></label>
            <button class="collapse-btn" onclick="toggleCollapse('sec-role')" tabindex="-1">▾</button>
          </div>
          <div class="field-body">
            <p class="field-desc" id="desc-role"></p>
            <input type="text" id="f-role" oninput="update()">
          </div>
        </div>

        <div class="form-section" id="sec-task">
          <div class="field-header">
            <span class="field-tag" id="tag-task"></span>
            <label for="f-task" id="lbl-task"></label>
            <button class="collapse-btn" onclick="toggleCollapse('sec-task')" tabindex="-1">▾</button>
          </div>
          <div class="field-body">
            <p class="field-desc" id="desc-task"></p>
            <textarea id="f-task" oninput="update()"></textarea>
          </div>
        </div>

        <div class="form-section" id="sec-context">
          <div class="field-header">
            <span class="field-tag optional" id="tag-context"></span>
            <label for="f-context" id="lbl-context"></label>
            <button class="collapse-btn" onclick="toggleCollapse('sec-context')" tabindex="-1">▾</button>
          </div>
          <div class="field-body">
            <p class="field-desc" id="desc-context"></p>
            <textarea id="f-context" oninput="update()"></textarea>
          </div>
        </div>

        <div class="form-section" id="sec-constraint">
          <div class="field-header">
            <span class="field-tag optional" id="tag-constraint"></span>
            <label for="f-constraint" id="lbl-constraint"></label>
            <button class="collapse-btn" onclick="toggleCollapse('sec-constraint')" tabindex="-1">▾</button>
          </div>
          <div class="field-body">
            <p class="field-desc" id="desc-constraint"></p>
            <textarea id="f-constraint" oninput="update()"></textarea>
          </div>
        </div>

        <div class="form-section" id="sec-format">
          <div class="field-header">
            <span class="field-tag" id="tag-format"></span>
            <label for="f-format" id="lbl-format"></label>
            <button class="collapse-btn" onclick="toggleCollapse('sec-format')" tabindex="-1">▾</button>
          </div>
          <div class="field-body">
            <p class="field-desc" id="desc-format"></p>
            <select id="f-format" onchange="update()"></select>
            <input type="text" id="f-format-custom" oninput="update()" style="display:none;margin-top:8px">
          </div>
        </div>

        <div class="form-section" id="sec-tone">
          <div class="field-header">
            <span class="field-tag optional" id="tag-tone"></span>
            <label for="f-tone" id="lbl-tone"></label>
            <button class="collapse-btn" onclick="toggleCollapse('sec-tone')" tabindex="-1">▾</button>
          </div>
          <div class="field-body">
            <p class="field-desc" id="desc-tone"></p>
            <select id="f-tone" onchange="update()"></select>
          </div>
        </div>

        <div class="form-section" id="sec-length">
          <div class="field-header">
            <span class="field-tag optional" id="tag-length"></span>
            <label for="f-length" id="lbl-length"></label>
            <button class="collapse-btn" onclick="toggleCollapse('sec-length')" tabindex="-1">▾</button>
          </div>
          <div class="field-body">
            <p class="field-desc" id="desc-length"></p>
            <select id="f-length" onchange="update()"></select>
          </div>
        </div>

        <div class="form-section" id="sec-reasoning">
          <div class="field-header">
            <span class="field-tag optional" id="tag-reasoning"></span>
            <label for="f-reasoning" id="lbl-reasoning"></label>
            <button class="collapse-btn" onclick="toggleCollapse('sec-reasoning')" tabindex="-1">▾</button>
          </div>
          <div class="field-body">
            <p class="field-desc" id="desc-reasoning"></p>
            <select id="f-reasoning" onchange="update()"></select>
            <p class="field-note" id="note-reasoning"></p>
          </div>
        </div>

        <div class="form-section" id="sec-lang">
          <div class="field-header">
            <span class="field-tag optional" id="tag-lang"></span>
            <label for="f-lang" id="lbl-lang"></label>
            <button class="collapse-btn" onclick="toggleCollapse('sec-lang')" tabindex="-1">▾</button>
          </div>
          <div class="field-body">
            <select id="f-lang" onchange="update()"></select>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-danger btn-sm" id="btn-reset" onclick="resetAll()"></button>
        </div>
      </div>

      <div class="right-panel">
        <!-- Preview Section -->
        <div class="panel-card">
          <div class="panel-title">
            PREVIEW
            <button class="preview-edit-toggle" id="editToggle" onclick="toggleEditMode()"></button>
          </div>
          <div class="preview-area" id="preview"></div>
          <div class="char-count" id="charCount"></div>
          <div class="prompt-actions">
            <button class="btn btn-primary copy-btn" id="copyBtn" onclick="copyPrompt()">
              <span id="copy-text"></span>
            </button>
            <button class="btn btn-share" id="shareBtn" onclick="sharePrompt()" style="display:none">
              <span id="share-text"></span>
            </button>
          </div>
          <div class="shortcut-hint" id="shortcut-hint"></div>
        </div>

        <!-- Templates Section -->
        <div class="panel-card">
          <div class="panel-title">TEMPLATES</div>
          <div class="cat-filter" id="catFilter"></div>
          <div class="template-list" id="templateList">
            <div class="empty-state" id="emptyState"></div>
          </div>
          <div class="template-save-row">
            <input type="text" id="templateName">
            <button class="btn btn-secondary btn-sm" id="btn-save" onclick="saveTemplate()"></button>
          </div>
          <div class="export-row">
            <button class="btn btn-secondary btn-sm" id="btn-export" onclick="exportTemplates()"></button>
            <button class="btn btn-secondary btn-sm" id="btn-share-tmpl" onclick="shareTemplates()" style="display:none"></button>
            <label class="btn btn-secondary btn-sm" id="btn-import-label" style="cursor:pointer;margin:0;justify-content:center">
              <span id="btn-import-text"></span>
              <input type="file" accept=".json" onchange="importTemplates(event)" style="display:none">
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>

</html>
